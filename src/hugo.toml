baseURL = "https://Daniel90mm.github.io/"
locale = "en-us"
title = "daniel — engineering log"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
pygmentsUseClasses = true

[params]
  env = "production"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  math = true
  tikz = false

  [params.homeInfoParams]
    Title = "Hi"
    Content = "Technical notes and writing."

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block  = [["\\[", "\\]"], ["$$", "$$"]]
      inline = [["\\(", "\\)"], ["$", "$"]]
  [markup.highlight]
    style = "monokai"

[outputs]
  home = ["HTML", "RSS", "JSON"]
